name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test-api:
    name: Test Rust API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app
      RUST_LOG: debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache Rust dependencies and build artifacts
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # We install sqlx-cli to run migrations
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres

      - name: Run Migrations
        run: sqlx migrate run

      - name: Run API tests
        run: cargo test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    # Run frontend concurrently with the API tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use native Node setup with built-in npm caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
  docker-integration:
    name: Docker Compose Verification
    runs-on: ubuntu-latest
    needs: [test-api, build-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Create .env.dev for CI
        run: |
          cat <<EOF > .env.dev
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=app
          DATABASE_URL=postgres://postgres:postgres@postgres:5432/app
          RUST_LOG=debug
          EOF

      - name: Build and start compose
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for services to stabilize
        run: sleep 10 # Give the containers a moment to start up

      # Replace localhost:8080 with whatever port your frontend or API is exposed on
      - name: Verify containers are running and responding
        run: |
          # Fails the pipeline if the curl request doesn't return a 200 OK
          curl --fail http://localhost:8080 || exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs
